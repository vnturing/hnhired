<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HN Who's Hiring Explorer</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body x-data="jobExplorer()" x-init="init()">

  <header>
    <h1>HN Who's Hiring Explorer</h1>
    <span x-show="!loading" x-text="`${allJobs.length} jobs indexed`"></span>
  </header>

  <main>

    <!-- ── Filters ── -->
    <div class="filters">
      <select x-model="remoteFilter" @change="applyFilters()">
        <option value="">Any remote type</option>
        <option value="global">🌍 Global Remote</option>
        <option value="us-only">🇺🇸 US Only</option>
        <option value="eu-only">🇪🇺 EU Only</option>
        <option value="tz-limited">🕐 TZ Limited</option>
        <option value="onsite">🏢 Onsite / Hybrid</option>
      </select>

      <input
        type="text"
        x-model="techFilter"
        @input="applyFilters()"
        placeholder="Filter by tech (python, go…)"
      />

      <input
        type="text"
        x-model="searchFilter"
        @input="applyFilters()"
        placeholder="Search company, role…"
      />

      <!-- Dismissed toggle — only shown if at least one job has been dismissed -->
      <label class="toggle-dismissed" x-show="dismissedCount > 0">
        <input type="checkbox" :checked="showDismissed" @change="toggleShowDismissed()" />
        Show dismissed (<span x-text="dismissedCount"></span>)
      </label>
    </div>

    <!-- ── Result count ── -->
    <p class="count" x-show="!loading">
      Showing <strong x-text="filtered.length"></strong> of
      <strong x-text="allJobs.length - (showDismissed ? 0 : dismissedCount)"></strong> jobs
    </p>

    <!-- ── Loading / error ── -->
    <div class="status" x-show="loading">Loading…</div>
    <div class="status" x-show="error" x-text="error"></div>

    <!-- ── Job cards ── -->
    <div class="job-list" x-show="!loading && !error">
      <template x-for="job in filtered" :key="job.id">
        <div
          class="job-card"
          :class="{
            'job-card--viewed':    isViewed(job.hn_item_id),
            'job-card--dismissed': isDismissed(job.hn_item_id)
          }"
        >

          <div class="job-card-header">
            <div class="job-card-title">
              <span class="job-company" x-text="job.company"></span>
              <!-- "opened" badge shown only after the link has been clicked -->
              <span class="viewed-badge" x-show="isViewed(job.hn_item_id)">✓ opened</span>
            </div>
            <div class="job-card-actions">
              <span class="job-remote" x-text="remoteLabel(job.remote_type)"></span>
              <!-- Dismiss button — shown on normal cards -->
              <button
                class="btn-dismiss"
                title="Dismiss this job"
                x-show="!isDismissed(job.hn_item_id)"
                @click.stop="dismiss(job.hn_item_id)"
              >✕</button>
              <!-- Restore button — shown only on dismissed cards when toggle is on -->
              <button
                class="btn-restore"
                title="Restore this job"
                x-show="isDismissed(job.hn_item_id)"
                @click.stop="undismiss(job.hn_item_id)"
              >↩ Restore</button>
            </div>
          </div>

          <p class="job-role" x-text="job.role"></p>

          <div class="tags">
            <template x-for="tag in job.tech_tags" :key="tag">
              <span class="tag" x-text="tag"></span>
            </template>
          </div>

          <div class="job-footer">
            <a
              :href="hnLink(job.hn_item_id)"
              target="_blank"
              rel="noopener"
              @click="markViewed(job.hn_item_id)"
            >
              View on HN ↗
            </a>
          </div>

        </div>
      </template>

      <div class="status" x-show="filtered.length === 0 && !loading">
        No jobs match your filters.
      </div>
    </div>

  </main>

  <script src="//unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="/app.js"></script>
</body>
</html>
